<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DUNYO CRM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.55" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="globe" x1="190" y1="180" x2="340" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="0.5" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="shade" cx="0.40" cy="0.36" r="0.78">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0c1a3a" stop-opacity="0.20"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="266" cy="262" r="86"/>
    </clipPath>
  </defs>

  <!-- Fon -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- "D" harfi (oq halqa) -->
  <path fill="#ffffff" fill-rule="evenodd" d="
    M120 104
    h106
    c82 0 142 64 142 152
    s-60 152 -142 152
    h-106
    z
    M180 164
    v184
    h46
    c52 0 86 -40 86 -92
    s-34 -92 -86 -92
    z
  "/>

  <!-- GLOBUS — D ning ochiq oynasiga to'g'ri markazlangan -->
  <g clip-path="url(#globeClip)">
    <circle cx="266" cy="262" r="86" fill="url(#globe)"/>

    <!-- Materiklar — Afrika + Yevropa silueti (soddalashtirilgan, tanib olinadigan) -->
    <!-- Afrika (markaz-past): keng yuqori, ingichka pastki uch -->
    <path fill="#dc2626" d="
      M250 244
      q14 -6 30 -2 q16 4 22 16 q4 12 -4 20 q2 14 -6 26 q-8 16 -22 22 q-10 4 -16 -4 q-8 -12 -4 -26 q-12 -8 -14 -22 q-2 -14 6 -24 q3 -4 8 -6 z
    "/>
    <!-- Yevropa (Afrika ustida, kichik) -->
    <path fill="#dc2626" d="
      M244 214 q14 -8 28 -4 q8 6 4 14 q-10 8 -8 18 q-12 4 -22 -2 q-8 -8 -6 -18 q2 -6 12 -8 z
    "/>
    <!-- Yarim orol / Arabiston (o'ng chekka) -->
    <path fill="#dc2626" d="M300 236 q12 0 16 10 q0 12 -12 16 q-12 0 -14 -10 q2 -12 10 -16 z"/>
    <!-- Amerika qoldig'i (chap chekka, oz qismi ko'rinadi) -->
    <path fill="#dc2626" d="M198 256 q12 -2 16 10 q0 14 -8 24 q-10 10 -18 2 q-6 -14 0 -26 q3 -8 10 -10 z"/>

    <!-- to'r chiziqlari -->
    <g stroke="#dc2626" stroke-opacity="0.40" stroke-width="2" fill="none">
      <ellipse cx="266" cy="262" rx="86" ry="36"/>
      <ellipse cx="266" cy="262" rx="86" ry="66"/>
      <ellipse cx="266" cy="262" rx="36" ry="86"/>
      <ellipse cx="266" cy="262" rx="66" ry="86"/>
      <line x1="266" y1="176" x2="266" y2="348"/>
      <line x1="180" y1="262" x2="352" y2="262"/>
    </g>

    <!-- hajm soyasi + yorug'lik -->
    <circle cx="266" cy="262" r="86" fill="url(#shade)"/>
    <ellipse cx="234" cy="226" rx="28" ry="18" fill="#ffffff" fill-opacity="0.38"/>
  </g>

  <!-- globus chetiga oq halqa -->
  <circle cx="266" cy="262" r="86" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.95"/>
</svg>
