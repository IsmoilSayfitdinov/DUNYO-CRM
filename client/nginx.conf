server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Backend proxy
    location /api/ {
        proxy_pass https://dunyo-crm-server-production.up.railway.app;
        proxy_set_header Host dunyo-crm-server-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
