server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Backend proxy
    location /api/ {
        proxy_pass https://api.supermarketdunyo.uz;
        proxy_set_header Host api.supermarketdunyo.uz;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
